name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release, for example v0.1.0
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: rust-release
  cancel-in-progress: false

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Resolve metadata
        id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          release_tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            release_tag="${INPUT_TAG}"
          fi
          echo "release_tag=${release_tag}" >>"$GITHUB_OUTPUT"
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib

          version = None
          for line in pathlib.Path("Cargo.toml").read_text(encoding="utf-8").splitlines():
            stripped = line.strip()
            if stripped.startswith("version ="):
              version = stripped.split("=", 1)[1].strip().strip('"')
              break
          if version is None:
            raise SystemExit("could not read Cargo.toml version")
          print(f"package_version={version}")
          PY

      - name: Validate tag matches crate version
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          PACKAGE_VERSION: ${{ steps.meta.outputs.package_version }}
        run: |
          expected_tag="v${PACKAGE_VERSION}"
          if [ "${RELEASE_TAG}" != "${expected_tag}" ]; then
            echo "::error::Release tag ${RELEASE_TAG} does not match crate version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check build
        run: cargo check --locked

      - name: Run tests
        run: cargo test --locked

      - name: Package crate
        run: cargo package --locked

      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp target/package/*.crate release-artifacts/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-artifacts
          path: release-artifacts/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release-artifacts/* --clobber
          else
            gh release create "${RELEASE_TAG}" release-artifacts/* --generate-notes --title "${RELEASE_TAG}"
          fi
